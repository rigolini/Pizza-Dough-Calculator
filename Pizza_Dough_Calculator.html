tipHydrationT:'💧 Hydration',tipHydration:'55–60%: firm, crisp (NY). 65–70%: softer, airier (Neapolitan). 70%+: very light but sticky. Home ovens: 60–68%.',tipFlourT:'🌾 Flour',tipFlour:'Protein creates gluten — the elastic network that gives dough stretch, structure and chew. <strong>Too little</strong> (below 10%): weak dough that tears easily, won\'t hold shape, flat dense crust. <strong>10–12%</strong>: softer, tender crust (all-purpose, Tipo 00). <strong>12–14%</strong>: strong, chewy crust ideal for most pizza (bread flour). <strong>Above 14%</strong>: overly tough, rubbery crust that becomes leathery as it cools. Match protein to style: Neapolitan ~11–12.5%, NY ~13–14%.',tipSemolinaT:'🟡 Semolina',tipSemolina:'Durum wheat (10–15% protein). Nutty, crispier bottom, firm chew. 10–20% blended. Not used in Neapolitan.',tipGlutenT:'💪 Gluten',tipGluten:'Pure protein (75–80%). Strengthens dough. Target 12–14% total. Over 3%: too tough.',tipBigaT:'🫗 Biga',tipBiga:'Stiff Italian pre-ferment: 100 g flour + 40 g water + 1–2 g dry yeast (or ~1 g fresh). Mix 12–24 h before at 15–20 °C — just combine, do not knead. Develops complex sharp flavours, strengthens gluten, lighter crumb. Traditional in Roman pizza.',
guide:`<h2>🍕 Ingredient & Pizza Style Guide</h2><h3>🗺️ Pizza Styles at a Glance</h3><p>Each Italian tradition calls for different dough characteristics:</p><div class="style-grid"><div class="style-card"><h4>🇮🇹 Neapolitan (Classic)</h4><p>The original, AVPN-regulated. Soft, pillowy crust with charred blisters, slightly wet centre. Baked at 450 °C for 60–90 s. Simple toppings. Direct dough, hand-stretched. No oil in dough.</p><div class="specs">Hydration 58–62% · Tipo 00 flour · Bun 200–280 g · Protein 11–13% · No oil</div></div><div class="style-card"><h4>🛥️ Canotto (Modern Neapolitan)</h4><p>A modern twist with a tall, inflated "dinghy" crust — light, airy honeycomb crumb. Higher hydration, often uses poolish or biga pre-ferment. Stronger Tipo 00 flour (W260–300). Baked slightly longer at ~370–400 °C.</p><div class="specs">Hydration 65–75% · Tipo 00 (strong) · Bun 240–280 g · No oil · Pre-ferment recommended</div></div><div class="style-card"><h4>🏛️ Roman (Tonda)</h4><p>Thin, crispy, crackly — almost cracker-like. Holds its shape, supports creative toppings. Often uses biga. Rolled flat with a pin, baked at ~340 °C for 4 min. Oil in dough for crispness.</p><div class="specs">Hydration 55–62% · Tipo 00 flour · Bun ~180–220 g · Oil 2–3%</div></div><div class="style-card"><h4>🍕 Roman (al Taglio)</h4><p>Rectangular tray pizza, sold by weight. High hydration for airy, open crumb — crunchy outside, soft inside. Long fermentation 24–72 h. Oil in dough and pan.</p><div class="specs">Hydration 75–80% · Tipo 0/1 (strong) flour · Pan-baked · Oil 3–5%</div></div><div class="style-card"><h4>🟧 Sicilian / Detroit</h4><p>Thick, spongy, focaccia-like in oiled pan. Generous toppings. Detroit adds brick cheese to edges for caramelised border. Oil generously in pan and dough.</p><div class="specs">Hydration 65–75% · Bread flour · Thick pan · Oil 3–5%</div></div><div class="style-card"><h4>🗽 New York Style</h4><p>Large foldable slices, crisp yet chewy crust. Evolved from Neapolitan via Italian immigrants. Bread flour, olive oil and sometimes sugar. Baked 260–290 °C for 8–12 min.</p><div class="specs">Hydration 58–65% · Bread flour · Bun ~260–310 g · Oil 1–3%</div></div><div class="style-card"><h4>🏠 Home Oven Tips</h4><p>Home ovens max ~250–300 °C. Use higher hydration (63–70%) to compensate for longer baking which dries the crust more. A pizza steel or stone helps crispier bottoms. Semolina in the mix adds crunch.</p><div class="specs">Hydration 63–70% · Bake 8–14 min · Pizza steel recommended</div></div></div><h3>🌾 Flour & Protein</h3><p>Flour is the foundation, and its protein content (10–14%) is the single most important factor in dough behaviour. Protein forms gluten when mixed with water — the elastic network that gives dough stretch, structure and chew, and traps fermentation gases for the crust to rise.</p><p><strong>Too little protein (below 10%)</strong>: weak gluten network — the dough tears easily during stretching, won\'t hold its shape during proofing, and produces a flat, dense crust with poor rise. <strong>The right range (11–13%)</strong>: strong enough to stretch thin without tearing, holds gas well, and creates a light, airy crust with good oven spring. <strong>Too much protein (above 14%)</strong>: overly tight gluten — the dough fights back when stretched, the crust becomes tough, rubbery and excessively chewy, and turns leathery as it cools.</p><p>Match protein to style: Neapolitan uses Tipo 00 at ~11–12.5% for a soft, tender crust. NY style uses bread flour at ~13–14% for chewy, foldable slices. Roman al taglio uses strong Tipo 0/1 flour. All-purpose (10–12%) gives a more tender, delicate result.</p><h3>🟡 Semolina</h3><p>Coarse golden flour from hard durum wheat (10–15% protein). Durum gluten is strong but less extensible, giving the crust a satisfying firm chew and crispier bottom. Adds a nutty, slightly sweet flavour and golden colour. A ratio of 10–20% blended with bread flour works well — too much makes dough dense and difficult to stretch. Fine semolina (semola rimacinata) is preferable for dough; coarse semolina is better as dusting flour. Not traditional in Neapolitan or Roman styles.</p><h3>💪 Vital Wheat Gluten</h3><p>Concentrated dried gluten protein (75–80%). Boosts the overall protein level, creating a stronger gluten network — better rise, more elasticity, chewier crust. Particularly useful when using weaker flour or blending with semolina. A target of 12–14% total protein is ideal. Be cautious: more than 2–3% added VWG can make the crust overly tough. VWG absorbs about 1.5× its weight in water, so increase hydration slightly when adding more.</p><h3>💧 Hydration</h3><p>The ratio of water to flour — the single biggest factor affecting crust texture. At <strong>55–60%</strong>: firm, easy-to-handle dough, crisp dense crust (NY style, Roman tonda). At <strong>63–70%</strong>: softer dough, lighter crumb, nice balance of crisp and chewy — the home oven sweet spot and Neapolitan range. At <strong>70%+</strong>: very soft, sticky dough yielding airy bubbly crusts (Roman al taglio, modern Neapolitan). Higher hydration requires hotter ovens or longer baking to evaporate the extra moisture.</p><h3>🧂 Salt</h3><p>Controls fermentation speed (slowing yeast), strengthens gluten, and is critical for flavour. The standard range for pizza is 1–3% of total dough weight. Too much inhibits yeast and toughens the dough; too little gives a bland, slack dough that over-rises.</p><h3>🫗 Biga (Pre-ferment)</h3><p>A stiff Italian pre-ferment — 100 g flour, 40 g water, and 1–2 g dry yeast (or 3–6 g fresh yeast), mixed 12–24 hours before the final dough at cool temperature (15–20 °C). Just combine until no dry flour remains — do not knead. It develops complex flavours with sharp aromatic notes from acetic acid, strengthens gluten, creates a lighter crumb with irregular air pockets, and improves digestibility. Biga is traditional in Roman-style pizza. A poolish (wetter French pre-ferment) gives softer, milder results. The fixed 100 g flour / 40 g water in this calculator represents a standard stiff biga. The biga should roughly double in size and develop a pungent, slightly alcoholic aroma when ready.</p><h3>🫒 Olive Oil</h3><p>Oil softens the dough, making it more pliable and easier to stretch. It creates a more tender crumb, helps achieve a golden crispy crust, and acts as a moisture barrier preventing toppings from making the base soggy. It also captures and retains aromas during baking, enhancing flavour. <strong>Extra virgin olive oil</strong> is the best choice for its rich, fruity flavour. Use <strong>2–3% of flour weight</strong> (e.g. 20–30 g per 1000 g flour); never exceed 5% or it can inhibit gluten development and slow fermentation. Add oil after the flour has absorbed the water. <strong>Neapolitan pizza — both classic and modern canotto — uses no oil in the dough</strong>; oil is only drizzled on top after baking. Most other styles (Roman, NY, Sicilian, Detroit) include oil. For pan pizzas (Sicilian, Detroit, al taglio), extra oil is also used to coat the pan, creating a fried, golden crust.</p>`
};

g> (< 10 %) : pâte fragile, croûte plate et dense. <strong>10–12 %</strong> : tendre (farine 00). <strong>12–14 %</strong> : idéal, croustillant et moelleux. <strong>Plus de 14 %</strong> : croûte dure et caoutchouteuse. Napolitaine ~11–12,5 %, NY ~13–14 %.',tipSemolinaT:'🟡 Semoule',tipSemolina:'Blé dur (10–15 %). Noisette, croustillant. 10–20 %. Pas utilisée en napolitaine.',tipGlutenT:'💪 Gluten',tipGluten:'Protéine concentrée (75–80 %). Renforce. Cible 12–14 %. Plus de 3 %: trop dur.',tipBigaT:'🫗 Biga',tipBiga:'Pré-ferment italien sec : 100 g farine + 40 g eau + 1–2 g levure sèche (ou 3–6 g fraîche). Mélanger 12–24 h avant à 15–20 °C, sans pétrir. Arômes complexes, gluten renforcé, mie légère. Traditionnelle en pizza romaine.',guide:`<h2>🍕 Guide des ingrédients & styles de pizza</h2><h3>🗺️ Les styles de pizza</h3><p>Chaque tradition italienne demande des caractéristiques de pâte différentes :</p><div class="style-grid"><div class="style-card"><h4>🇮🇹 Napolitaine (Classique)</h4><p>L'originale, réglementée AVPN. Croûte souple et boursouflée, centre légèrement humide. Cuisson à 450 °C pendant 60–90 s. Pas d'huile dans la pâte.</p><div class="specs">Hydratation 58–62 % · Farine Tipo 00 · Pâton 200–280 g · Sans huile</div></div><div class="style-card"><h4>🛥️ Canotto (Napolitaine Moderne)</h4><p>Version moderne avec un cornicione haut et aéré en nid d'abeille. Hydratation élevée, souvent avec poolish ou biga. Farine 00 forte (W260–300). Cuisson ~370–400 °C.</p><div class="specs">Hydratation 65–75 % · Farine 00 (forte) · Pâton 240–280 g · Sans huile · Pré-ferment recommandé</div></div><div class="style-card"><h4>🏛️ Romaine (Tonda)</h4><p>Fine, croustillante, presque craquante. Souvent avec biga. Étalée au rouleau, ~340 °C, 4 min. Huile dans la pâte.</p><div class="specs">Hydratation 55–62 % · Farine 00 · Pâton ~180–220 g · Huile 2–3 %</div></div><div class="style-card"><h4>🍕 Romaine (al Taglio)</h4><p>Rectangulaire sur plaque. Haute hydratation, mie aérée. Longue fermentation 24–72 h. Huile dans pâte et plaque.</p><div class="specs">Hydratation 75–80 % · Farine Tipo 0/1 · Sur plaque · Huile 3–5 %</div></div><div class="style-card"><h4>🟧 Sicilienne / Detroit</h4><p>Épaisse, spongieuse, en moule huilé. Garnitures généreuses. Huile abondante.</p><div class="specs">Hydratation 65–75 % · Farine de force · Moule · Huile 3–5 %</div></div><div class="style-card"><h4>🗽 New York</h4><p>Parts pliables, croustillantes et moelleuses. Farine de force, huile et parfois sucre.</p><div class="specs">Hydratation 58–65 % · Farine de force · Pâton ~260–310 g · Huile 1–3 %</div></div><div class="style-card"><h4>🏠 Four domestique</h4><p>Max ~250–300 °C. Hydratation plus haute (63–70 %). Pierre/acier à pizza pour un fond croustillant.</p><div class="specs">Hydratation 63–70 % · Cuisson 8–14 min</div></div></div><h3>🌾 Farine & Protéines</h3><p>Base de la pâte. Les protéines (10–14 %) forment le gluten au contact de l'eau — le réseau élastique qui donne structure, extensibilité et mâche, et piège le gaz de fermentation.</p><p><strong>Trop peu (< 10 %)</strong> : gluten faible — la pâte se déchire, ne tient pas sa forme, croûte plate et dense. <strong>Bon dosage (11–13 %)</strong> : pâte extensible, bonne levée, croûte légère et aérée. <strong>Trop (> 14 %)</strong> : gluten trop serré — pâte résistante, croûte dure, caoutchouteuse, qui durcit en refroidissant.</p><p>Adaptez aux styles : Napolitaine → Tipo 00 (~11–12,5 %). NY → farine de force (~13–14 %). Al taglio → Tipo 0/1. Farine ordinaire (10–12 %) → résultat plus tendre.</p><h3>🟡 Semoule</h3><p>Farine dorée de blé dur (10–15 % protéines). Mâche ferme, fond croustillant, saveur noisette et couleur dorée. 10–20 % mélangée à la farine. Semoule fine (rimacinata) préférable. Pas traditionnelle en napolitaine ni romaine.</p><h3>💪 Gluten vital</h3><p>Protéine concentrée (75–80 %). Renforce le réseau de gluten — meilleure levée, plus d'élasticité, croûte plus moelleuse. Cible 12–14 % protéines totales. Plus de 2–3 % : croûte dure. Absorbe ~1,5× son poids en eau.</p><h3>💧 Hydratation</h3><p>Ratio eau/farine — le facteur le plus important pour la texture. <strong>55–60 %</strong> : ferme, croustillante (NY, romaine tonda). <strong>63–70 %</strong> : idéal four maison et napolitaine. <strong>70 %+</strong> : très aérée (al taglio). Plus d'hydratation = four plus chaud ou cuisson plus longue.</p><h3>🧂 Sel</h3><p>Contrôle la fermentation, renforce le gluten, essentiel au goût. Standard : 1–3 % du poids total.</p><h3>🫗 Biga</h3><p>Pré-ferment italien sec — 100 g farine, 40 g eau et 1–2 g levure sèche (ou 3–6 g fraîche), mélangés 12–24 h avant à 15–20 °C. Mélanger sans pétrir. Développe des arômes complexes, renforce le gluten, mie plus légère. La biga doit doubler de volume et dégager un arôme alcoolisé. Traditionnelle pour la pizza romaine.</p><h3>🫒 Huile d'olive</h3><p>Assouplit la pâte, mie plus tendre, croûte dorée et croustillante, barrière contre l'humidité. <strong>Huile d'olive extra vierge</strong> recommandée. <strong>2–3 % du poids de la farine</strong>, max 5 %. <strong>La napolitaine — classique comme canotto — n'utilise pas d'huile dans la pâte</strong>. Les autres styles (romaine, NY, sicilienne, Detroit) en incluent. Pour les pizzas en moule, huile supplémentaire dans le moule.</p>`};

%</strong>: tierna (harina 00). <strong>12–14 %</strong>: ideal, crujiente y masticable. <strong>Más del 14 %</strong>: corteza dura y gomosa. Napolitana ~11–12,5 %, NY ~13–14 %.',tipSemolinaT:'🟡 Sémola',tipSemolina:'Trigo duro (10–15 %). Nuez, crujiente. 10–20 %. No en napolitana.',tipGlutenT:'💪 Gluten',tipGluten:'Proteína concentrada (75–80 %). Objetivo 12–14 %. Más de 3 %: dura.',tipBigaT:'🫗 Biga',tipBiga:'Pre-fermento italiano seco: 100 g harina + 40 g agua + 1–2 g levadura seca (o 3–6 g fresca). Mezclar 12–24 h antes a 15–20 °C, sin amasar. Aromas complejos, gluten fuerte. Tradicional en romana.',guide:`<h2>🍕 Guía de ingredientes y estilos</h2><h3>🗺️ Estilos de pizza</h3><p>Cada tradición italiana requiere características de masa diferentes:</p><div class="style-grid"><div class="style-card"><h4>🇮🇹 Napolitana (Clásica)</h4><p>La original, regulada por AVPN. Corteza suave con ampollas carbonizadas, centro ligeramente húmedo. Cocción a 450 °C durante 60–90 s. Sin aceite en la masa.</p><div class="specs">Hidratación 58–62 % · Harina Tipo 00 · Bollo 200–280 g · Sin aceite</div></div><div class="style-card"><h4>🛥️ Canotto (Napolitana Moderna)</h4><p>Versión moderna con borde alto y aireado, miga en panal. Hidratación elevada, a menudo con poolish o biga. Harina 00 fuerte (W260–300). Cocción ~370–400 °C.</p><div class="specs">Hidratación 65–75 % · Harina 00 (fuerte) · Bollo 240–280 g · Sin aceite · Pre-fermento recomendado</div></div><div class="style-card"><h4>🏛️ Romana (Tonda)</h4><p>Fina, crujiente, tipo cracker. Con biga. Estirada con rodillo, ~340 °C, 4 min. Aceite en la masa.</p><div class="specs">Hidratación 55–62 % · Harina 00 · Bollo ~180–220 g · Aceite 2–3 %</div></div><div class="style-card"><h4>🍕 Romana (al Taglio)</h4><p>Rectangular en bandeja. Alta hidratación, miga aireada. Fermentación larga 24–72 h. Aceite en masa y bandeja.</p><div class="specs">Hidratación 75–80 % · Harina Tipo 0/1 · Bandeja · Aceite 3–5 %</div></div><div class="style-card"><h4>🟧 Siciliana / Detroit</h4><p>Gruesa, esponjosa, en molde aceitado. Ingredientes generosos. Aceite abundante.</p><div class="specs">Hidratación 65–75 % · Harina de fuerza · Molde · Aceite 3–5 %</div></div><div class="style-card"><h4>🗽 New York</h4><p>Porciones plegables, crujientes y masticables. Harina de fuerza, aceite y a veces azúcar.</p><div class="specs">Hidratación 58–65 % · Harina de fuerza · Bollo ~260–310 g · Aceite 1–3 %</div></div><div class="style-card"><h4>🏠 Horno doméstico</h4><p>Max ~250–300 °C. Hidratación más alta (63–70 %). Piedra/acero para fondo crujiente.</p><div class="specs">Hidratación 63–70 % · Cocción 8–14 min</div></div></div><h3>🌾 Harina & Proteínas</h3><p>Base de la masa. Las proteínas (10–14 %) forman el gluten con el agua — la red elástica que da estructura, elasticidad y textura, y atrapa el gas de fermentación.</p><p><strong>Muy poca (< 10 %)</strong>: gluten débil — la masa se rasga, no mantiene la forma, corteza plana y densa. <strong>Rango correcto (11–13 %)</strong>: masa extensible, buena subida, corteza ligera y aireada. <strong>Demasiada (> 14 %)</strong>: gluten demasiado tenso — masa resistente, corteza dura, gomosa, que se endurece al enfriarse.</p><p>Según el estilo: Napolitana → Tipo 00 (~11–12,5 %). NY → harina de fuerza (~13–14 %). Al taglio → Tipo 0/1. Harina común (10–12 %) → resultado más tierno.</p><h3>🟡 Sémola</h3><p>Trigo duro (10–15 % proteínas). Textura firme, fondo crujiente, sabor a nuez. 10–20 % mezclada. Sémola fina preferible. No tradicional en napolitana.</p><h3>💪 Gluten vital</h3><p>Proteína concentrada (75–80 %). Más fuerza, mejor fermentación, corteza más masticable. Objetivo 12–14 %. Más del 2–3 %: corteza dura. Absorbe ~1,5× su peso en agua.</p><h3>💧 Hidratación</h3><p>Ratio agua/harina. <strong>55–60 %</strong>: firme, crujiente. <strong>63–70 %</strong>: equilibrio ideal horno doméstico y napolitana. <strong>70 %+</strong>: muy aireada (al taglio). Más hidratación = horno más caliente o cocción más larga.</p><h3>🧂 Sal</h3><p>1–3 % del peso total. Controla fermentación, refuerza gluten, esencial para sabor.</p><h3>🫗 Biga</h3><p>Pre-fermento italiano seco — 100 g harina, 40 g agua y 1–2 g levadura seca (o 3–6 g fresca), mezclados 12–24 h antes a 15–20 °C. Mezclar sin amasar. Aromas complejos, gluten reforzado, miga ligera. Debe duplicar su volumen. Tradicional en pizza romana.</p><h3>🫒 Aceite de oliva</h3><p>Ablanda la masa, miga más tierna, corteza dorada. <strong>AOVE</strong> recomendado. <strong>2–3 % del peso de la harina</strong>, max 5 %. <strong>La napolitana — clásica y canotto — no lleva aceite en la masa</strong>. Los demás estilos lo incluyen. En pizzas en molde, aceite adicional en la bandeja.</p>`};
T.de={title:'Pizzateig-Rechner',subtitle:'Von Jamele Rigolini',guideBtn:'📖 Alles über Zutaten & Pizzastile',sizing:'Portionierung',byNum:'Nach Anzahl',byQty:'Nach Mengen',numPizzas:'Anzahl Pizzen',bunWeight:'Teigling-Gewicht',bunWeightNote:'Gesamtgewicht inkl. Salz',semProp:'Grießanteil',semPropNote:'Grieß als % von Mehl+Grieß',flourQty:'Mehlmenge',semolinaQty:'Grießmenge',doughParams:'Parameter',hydration:'Hydration',hydrationNote:'Wasser ÷ Mehl (inkl. Biga)',salt:'Salz',saltNote:'Als % des Gesamtteigs',bigaFlour:'Biga-Mehl',bigaWater:'Biga-Wasser',bigaNote:'Fest: 100 g Mehl + 40 g Wasser + 1–2 g Trockenhefe. 12–24 h vorher bei 15–20 °C ansetzen',bigaLabel:'Biga (Vorteig)',bigaRecipeNote:'12–24 h vorher bei 15–20 °C ansetzen. 1–2 g Trockenhefe (oder 3–6 g Frischhefe) zu Mehl und Wasser geben. Nur mischen, nicht kneten. Mehl und Wasser der Biga sind bereits in den Gesamtmengen oben enthalten.',proteinContent:'Protein',flourProtein:'Mehl-Protein',semProtein:'Grieß-Protein',glutenProtein:'Gluten-Protein',targetProtein:'Ziel-Protein',proteinNote:'Protein bildet Gluten. Zu wenig (<10 %): schwach. Zu viel (>14 %): zähe, gummiartige Kruste.',glutenAutoNote:'Gluten auto · Ist:',recipe:'Dein Rezept',flour:'Mehl',semolina:'Grieß',gluten:'Gluten',water:'Wasser',saltIng:'Salz',oil:'Olivenöl',oilOptional:'optional',oilRange:'Empfohlen: 2–3 % des Mehls',total:'gesamt',inBiga:'in Biga',totalDough:'Gesamtteig',pizzas:'Pizzen',pizzasApprox:'Pizzen (≈)',grams:'Gramm',each:'je',protein:'Protein',warningNum:'Biga-Mehl übersteigt Mehl.',warningQty:'Biga-Mehl übersteigt Mehl.',breadFlour:'Brotmehl',tipHydrationT:'💧 Hydration',tipHydration:'55–60 %: fest. 65–70 %: weicher. 70 %+: luftig. Heimofen: 60–68 %.',tipFlourT:'🌾 Mehl',tipFlour:'Protein bildet Gluten — das elastische Netzwerk für Struktur und Biss. <strong>Zu wenig</strong> (< 10 %): schwacher Teig, flache dichte Kruste. <strong>10–12 %</strong>: zart (00-Mehl). <strong>12–14 %</strong>: ideal, knusprig-kaubar. <strong>Über 14 %</strong>: zäh und gummiartig. Neapolitanisch ~11–12,5 %, NY ~13–14 %.',tipSemolinaT:'🟡 Grieß',tipSemolina:'Hartweizen (10–15 %). Nussig, knusprig. 10–20 %. Nicht bei Neapolitanisch.',tipGlutenT:'💪 Gluten',tipGluten:'Konzentriert (75–80 %). Ziel 12–14 %. Über 3 %: zäh.',tipBigaT:'🫗 Biga',tipBiga:'Steifer ital. Vorteig: 100 g Mehl + 40 g Wasser + 1–2 g Trockenhefe (oder 3–6 g Frischhefe). 12–24 h vorher bei 15–20 °C mischen, nicht kneten. Komplexe Aromen, stärkeres Gluten. Traditionell römisch.',guide:`<h2>🍕 Zutaten- & Pizza-Stilführer</h2><h3>🗺️ Pizzastile im Überblick</h3><p>Jede italienische Tradition erfordert unterschiedliche Teigeigenschaften:</p><div class="style-grid"><div class="style-card"><h4>🇮🇹 Neapolitanisch (Klassisch)</h4><p>Das Original, AVPN-reguliert. Weiche Kruste mit Blasen, feuchte Mitte. 450 °C, 60–90 s. Kein Öl im Teig.</p><div class="specs">Hydration 58–62 % · Tipo 00 · Teigling 200–280 g · Kein Öl</div></div><div class="style-card"><h4>🛥️ Canotto (Modernes Neapolitanisch)</h4><p>Modern mit hohem, luftigem Rand — Honigwaben-Krume. Höhere Hydration, oft mit Poolish oder Biga. Stärkeres 00-Mehl (W260–300). ~370–400 °C.</p><div class="specs">Hydration 65–75 % · Tipo 00 (stark) · Teigling 240–280 g · Kein Öl · Vorteig empfohlen</div></div><div class="style-card"><h4>🏛️ Römisch (Tonda)</h4><p>Dünn, knusprig, cracker-artig. Oft mit Biga. Ausgerollt, ~340 °C, 4 Min. Öl im Teig.</p><div class="specs">Hydration 55–62 % · Tipo 00 · Teigling ~180–220 g · Öl 2–3 %</div></div><div class="style-card"><h4>🍕 Römisch (al Taglio)</h4><p>Rechteckig auf Blech. Hohe Hydration, luftige Krume. Lange Gare 24–72 h. Öl in Teig und Blech.</p><div class="specs">Hydration 75–80 % · Tipo 0/1 · Blech · Öl 3–5 %</div></div><div class="style-card"><h4>🟧 Sizilianisch / Detroit</h4><p>Dick, schwammig, in geöltem Blech. Reichlich Belag. Öl großzügig.</p><div class="specs">Hydration 65–75 % · Brotmehl · Blech · Öl 3–5 %</div></div><div class="style-card"><h4>🗽 New York</h4><p>Faltbare Stücke, knusprig-kaubar. Brotmehl, Öl und manchmal Zucker.</p><div class="specs">Hydration 58–65 % · Brotmehl · Teigling ~260–310 g · Öl 1–3 %</div></div><div class="style-card"><h4>🏠 Heimofen-Tipps</h4><p>Max ~250–300 °C. Höhere Hydration (63–70 %). Pizzastahl hilft für knusprigere Ergebnisse.</p><div class="specs">Hydration 63–70 % · Backzeit 8–14 Min.</div></div></div><h3>🌾 Mehl & Protein</h3><p>Basis des Teigs. Protein (10–14 %) bildet mit Wasser Gluten — das elastische Netzwerk für Struktur, Dehnbarkeit und Biss, das Gärungsgase einschließt.</p><p><strong>Zu wenig (< 10 %)</strong>: schwaches Gluten — Teig reißt, hält Form nicht, flache dichte Kruste. <strong>Richtig (11–13 %)</strong>: dehnbar, guter Ofentrieb, leichte luftige Kruste. <strong>Zu viel (> 14 %)</strong>: zu festes Gluten — Teig wehrt sich, Kruste zäh, gummiartig, wird beim Abkühlen ledrig.</p><p>Je nach Stil: Neapolitanisch → Tipo 00 (~11–12,5 %). NY → Brotmehl (~13–14 %). Al Taglio → Tipo 0/1. Haushaltsmehl (10–12 %) → zarteres Ergebnis.</p><h3>🟡 Grieß</h3><p>Goldenes Hartweizen-Mehl (10–15 % Protein). Fester Biss, knuspriger Boden, nussiger Geschmack. 10–20 % gemischt. Feiner Grieß (Rimacinata) bevorzugt. Nicht traditionell bei Neapolitanisch.</p><h3>💪 Weizengluten</h3><p>Konzentriertes Glutenprotein (75–80 %). Stärkt Teig, besserer Aufgang, kaubarere Kruste. Ziel 12–14 %. Über 2–3 %: Kruste zäh. Absorbiert ~1,5× sein Gewicht an Wasser.</p><h3>💧 Hydration</h3><p>Wasser-Mehl-Verhältnis. <strong>55–60 %</strong>: fest, knusprig (NY, Römisch Tonda). <strong>63–70 %</strong>: Heimofen-ideal und Neapolitanisch. <strong>70 %+</strong>: sehr luftig (al Taglio). Mehr Hydration = heißerer Ofen oder längeres Backen nötig.</p><h3>🧂 Salz</h3><p>1–3 % des Gesamtgewichts. Steuert Gärung, stärkt Gluten, essenziell für Geschmack.</p><h3>🫗 Biga</h3><p>Steifer italienischer Vorteig — 100 g Mehl, 40 g Wasser und 1–2 g Trockenhefe (oder 3–6 g Frischhefe), 12–24 h vorher bei 15–20 °C mischen, nicht kneten. Komplexe Aromen, stärkeres Gluten, leichtere Krume. Sollte sich verdoppeln. Traditionell für römische Pizza.</p><h3>🫒 Olivenöl</h3><p>Macht Teig weicher, zartere Krume, goldene knusprige Kruste, Feuchtigkeitsbarriere. <strong>Extra natives Olivenöl</strong> empfohlen. <strong>2–3 % des Mehlgewichts</strong>, max 5 %. <strong>Neapolitanisch — klassisch und Canotto — kein Öl im Teig</strong>. Andere Stile (Römisch, NY, Sizilianisch) verwenden es. Bei Blechpizzen zusätzlich Öl im Blech.</p>`};
T.it={title:'Calcolatore Impasto Pizza',subtitle:'Di Jamele Rigolini',guideBtn:'📖 Scopri ingredienti & stili di pizza',sizing:'Dosaggio',byNum:'Per numero',byQty:'Per quantità',numPizzas:'Numero pizze',bunWeight:'Peso panetto',bunWeightNote:'Peso totale, sale incluso',semProp:'Proporzione semola',semPropNote:'Semola come % di farina+semola',flourQty:'Quantità farina',semolinaQty:'Quantità semola',doughParams:'Parametri',hydration:'Idratazione',hydrationNote:'Acqua totale ÷ farina totale (biga incl.)',salt:'Sale',saltNote:'Come % del peso totale',bigaFlour:'Farina biga',bigaWater:'Acqua biga',bigaNote:'Fisso: 100 g farina + 40 g acqua + 1–2 g lievito secco. Preparare 12–24 h prima a 15–20 °C',bigaLabel:'Biga (pre-fermento)',bigaRecipeNote:'Preparare 12–24 h prima a 15–20 °C. Aggiungere 1–2 g di lievito secco (o 3–6 g di lievito fresco) a farina e acqua. Mescolare senza impastare. La farina e l\'acqua della biga sono già incluse nei totali sopra.',proteinContent:'Proteine',flourProtein:'Proteine farina',semProtein:'Proteine semola',glutenProtein:'Proteine glutine',targetProtein:'Proteine obiettivo',proteinNote:'Le proteine formano il glutine. Troppo poche (<10 %): fragile. Troppe (>14 %): crosta dura e gommosa.',glutenAutoNote:'Glutine auto · Reale:',recipe:'La tua ricetta',flour:'Farina',semolina:'Semola',gluten:'Glutine',water:'Acqua',saltIng:'Sale',oil:"Olio d'oliva",oilOptional:'opzionale',oilRange:'Consigliato: 2–3 % della farina',total:'totale',inBiga:'nella biga',totalDough:'Impasto totale',pizzas:'Pizze',pizzasApprox:'Pizze (≈)',grams:'grammi',each:'ciascuno',protein:'Proteine',warningNum:'Farina biga supera la farina.',warningQty:'Farina biga supera la farina.',breadFlour:'Farina di forza',tipHydrationT:'💧 Idratazione',tipHydration:'55–60 %: sodo. 65–70 %: morbido. 70 %+: arioso. Forno: 60–68 %.',tipFlourT:'🌾 Farina',tipFlour:'Le proteine formano il glutine — la rete elastica che dà struttura e masticabilità. <strong>Troppo poche</strong> (< 10 %): impasto fragile, crosta densa. <strong>10–12 %</strong>: tenera (farina 00). <strong>12–14 %</strong>: ideale, croccante e masticabile. <strong>Oltre 14 %</strong>: crosta dura e gommosa. Napoletana ~11–12,5 %, NY ~13–14 %.',tipSemolinaT:'🟡 Semola',tipSemolina:'Grano duro (10–15 %). Nocciola, croccante. 10–20 %. Non in napoletana.',tipGlutenT:'💪 Glutine',tipGluten:'Concentrato (75–80 %). Obiettivo 12–14 %. Oltre 3 %: dura.',tipBigaT:'🫗 Biga',tipBiga:'Pre-fermento italiano rigido: 100 g farina + 40 g acqua + 1–2 g lievito secco (o ~1 g fresco). Mescolare 12–24 h prima a 15–20 °C, senza impastare. Aromi complessi, glutine più forte. Tradizionale nella romana.',guide:`<h2>🍕 Guida ingredienti e stili di pizza</h2><h3>🗺️ Stili di pizza</h3><p>Ogni tradizione italiana richiede caratteristiche diverse dell'impasto:</p><div class="style-grid"><div class="style-card"><h4>🇮🇹 Napoletana (Classica)</h4><p>L'originale, regolamentata AVPN. Cornicione soffice con bolle carbonizzate, centro leggermente umido. Cottura a 450 °C per 60–90 s. Niente olio nell'impasto.</p><div class="specs">Idratazione 58–62 % · Farina Tipo 00 · Panetto 200–280 g · Senza olio</div></div><div class="style-card"><h4>🛥️ Canotto (Napoletana Moderna)</h4><p>Versione moderna con cornicione alto e arioso a nido d'ape. Idratazione elevata, spesso con poolish o biga. Farina 00 forte (W260–300). Cottura ~370–400 °C.</p><div class="specs">Idratazione 65–75 % · Farina 00 (forte) · Panetto 240–280 g · Senza olio · Pre-fermento consigliato</div></div><div class="style-card"><h4>🏛️ Romana (Tonda)</h4><p>Sottile, croccante, tipo cracker. Spesso con biga. Stesa col mattarello, ~340 °C, 4 min. Olio nell'impasto.</p><div class="specs">Idratazione 55–62 % · Farina 00 · Panetto ~180–220 g · Olio 2–3 %</div></div><div class="style-card"><h4>🍕 Romana (al Taglio)</h4><p>Rettangolare in teglia. Alta idratazione, mollica ariosa. Lunga lievitazione 24–72 h. Olio in impasto e teglia.</p><div class="specs">Idratazione 75–80 % · Farina Tipo 0/1 · Teglia · Olio 3–5 %</div></div><div class="style-card"><h4>🟧 Siciliana / Detroit</h4><p>Spessa, spugnosa, in teglia oliata. Condimenti generosi. Olio abbondante.</p><div class="specs">Idratazione 65–75 % · Farina di forza · Teglia · Olio 3–5 %</div></div><div class="style-card"><h4>🗽 New York</h4><p>Fette pieghevoli, croccanti e morbide. Farina di forza, olio e a volte zucchero.</p><div class="specs">Idratazione 58–65 % · Farina di forza · Panetto ~260–310 g · Olio 1–3 %</div></div><div class="style-card"><h4>🏠 Forno domestico</h4><p>Max ~250–300 °C. Idratazione più alta (63–70 %). Pietra/acciaio per fondo croccante.</p><div class="specs">Idratazione 63–70 % · Cottura 8–14 min</div></div></div><h3>🌾 Farina & Proteine</h3><p>Base dell'impasto. Le proteine (10–14 %) formano il glutine con l'acqua — la rete elastica che dà struttura, estensibilità e masticabilità, e trattiene i gas di fermentazione.</p><p><strong>Troppo poche (< 10 %)</strong>: glutine debole — l'impasto si strappa, non tiene la forma, crosta piatta e densa. <strong>Giusto (11–13 %)</strong>: estensibile, buona lievitazione, crosta leggera e ariosa. <strong>Troppe (> 14 %)</strong>: glutine troppo rigido — impasto resistente, crosta dura, gommosa, diventa coriacea raffreddandosi.</p><p>Secondo lo stile: Napoletana → Tipo 00 (~11–12,5 %). NY → farina di forza (~13–14 %). Al taglio → Tipo 0/1. Farina comune (10–12 %) → risultato più tenero.</p><h3>🟡 Semola</h3><p>Grano duro (10–15 % proteine). Masticabilità, fondo croccante, sapore di nocciola e colore dorato. 10–20 % miscelata. Semola rimacinata preferibile. Non tradizionale in napoletana.</p><h3>💪 Glutine vitale</h3><p>Proteina concentrata (75–80 %). Rafforza il glutine — migliore lievitazione, più elasticità, crosta più masticabile. Obiettivo 12–14 %. Oltre 2–3 %: crosta dura. Assorbe ~1,5× il suo peso in acqua.</p><h3>💧 Idratazione</h3><p>Rapporto acqua/farina — il fattore più importante. <strong>55–60 %</strong>: sodo, croccante (NY, romana tonda). <strong>63–70 %</strong>: equilibrio ideale forno domestico e napoletana. <strong>70 %+</strong>: molto ariosa (al taglio). Più idratazione = forno più caldo o cottura più lunga.</p><h3>🧂 Sale</h3><p>1–3 % del peso totale. Controlla fermentazione, rafforza glutine, essenziale per il sapore.</p><h3>🫗 Biga</h3><p>Pre-fermento italiano rigido — 100 g farina, 40 g acqua e 1–2 g lievito secco (o ~1 g fresco), mescolati 12–24 h prima a 15–20 °C. Mescolare senza impastare. Aromi complessi, glutine più forte, mollica più leggera. Deve raddoppiare di volume. Tradizionale nella pizza romana.</p><h3>🫒 Olio d'oliva</h3><p>Ammorbidisce l'impasto, mollica più tenera, crosta dorata e croccante, barriera contro l'umidità. <strong>Olio extravergine</strong> consigliato. <strong>2–3 % del peso della farina</strong>, max 5 %. <strong>La napoletana — classica e canotto — non usa olio nell'impasto</strong>. Gli altri stili lo includono. Per le pizze in teglia, olio aggiuntivo nella teglia.</p>`};

let lang='en',activePreset='jamele';
function t(k){return T[lang][k]||T.en[k]||k}

const state={mode:'numPizzas',numPizzas:6,pizzaWeight:300,semolinaRatio:15,flourQty:900,semolinaQty:200,flourProtein:13.3,semolinaProtein:13.33,glutenProtein:76.7,targetProtein:14,hydration:60,saltPercent:1,bigaFlour:100,bigaWater:40};

function applyPreset(id){
  activePreset=id;const p=presets[id];
  Object.keys(p).forEach(k=>{if(k!=='landscape')state[k]=p[k]});
  state.mode='numPizzas';render();
}

function compute(s){
  const pF=s.flourProtein/100,pS=s.semolinaProtein/100,pG=s.glutenProtein/100,target=s.targetProtein/100,hydFrac=s.hydration/100,saltFrac=s.saltPercent/100;
  if(s.mode==='numPizzas'){
    const td=s.numPizzas*s.pizzaWeight,tf=td*(1-saltFrac)/(1+hydFrac),sr=s.semolinaRatio/100,mixP=(1-sr)*pF+sr*pS;
    let g=0;if(Math.abs(pG-mixP)>1e-4)g=tf*(target-mixP)/(pG-mixP);if(g<0)g=0;
    const flour=(tf-g)*(1-sr),semolina=(tf-g)*sr,tw=tf*hydFrac,salt=saltFrac*td,ap=tf>0?(flour*pF+semolina*pS+g*pG)/tf*100:0;
    return{flour:Math.round(flour),semolina:Math.round(semolina),gluten:Math.round(g),totalFlour:Math.round(tf),totalWater:Math.round(tw),netFlour:Math.round(flour-s.bigaFlour),netSemolina:Math.round(semolina),netGluten:Math.round(g),netWater:Math.round(tw-s.bigaWater),salt:Math.round(salt),totalDough:Math.round(td),numPizzas:s.numPizzas,actualProtein:ap,oilLow:Math.round(tf*.02),oilHigh:Math.round(tf*.03),warning:flour-s.bigaFlour<0?t('warningNum'):null};
  }else{
    const flour=s.flourQty,semolina=s.semolinaQty;
    let g=0;if(Math.abs(pG-target)>1e-4)g=((flour+semolina)*target-flour*pF-semolina*pS)/(pG-target);if(g<0)g=0;
    const tf=flour+semolina+g,tw=tf*hydFrac,td=(tf+tw)/(1-saltFrac),salt=saltFrac*td,ap=tf>0?(flour*pF+semolina*pS+g*pG)/tf*100:0;
    return{flour:Math.round(flour),semolina:Math.round(semolina),gluten:Math.round(g),totalFlour:Math.round(tf),totalWater:Math.round(tw),netFlour:Math.round(flour-s.bigaFlour),netSemolina:Math.round(semolina),netGluten:Math.round(g),netWater:Math.round(tw-s.bigaWater),salt:Math.round(salt),totalDough:Math.round(td),numPizzas:td/s.pizzaWeight,actualProtein:ap,oilLow:Math.round(tf*.02),oilHigh:Math.round(tf*.03),warning:flour-s.bigaFlour<0?t('warningQty'):null};
  }
}

function render(){
  const r=compute(state),ls=['en','fr','es','de','it'],lbl=['🇬🇧','🇫🇷','🇪🇸','🇩🇪','🇮🇹'],pk=Object.keys(presets);
  document.getElementById('heroMount').innerHTML=`<div class="hero"><img src="${heroImage}" alt="" loading="eager" onerror="this.style.display='none';this.parentElement.style.background='linear-gradient(135deg,#c0582a22,#e8a67a33,#faf6f1)'"><div class="hero-overlay"></div></div>`;
  document.getElementById('app').innerHTML=`
  <header><h1>${t('title')}</h1><div class="subtitle">${t('subtitle')}</div>
  <div class="lang-bar">${ls.map((c,i)=>`<button class="lang-btn ${lang===c?'active':''}" onclick="setLang('${c}')">${lbl[i]}</button>`).join('')}</div>
  <div class="preset-bar">${pk.map(k=>`<button class="preset-btn ${activePreset===k?'active':''}" onclick="applyPreset('${k}')">${(presetNames[lang]||presetNames.en)[k]}</button>`).join('')}</div>
  <div class="preset-desc">${(presetDescs[lang]||presetDescs.en)[activePreset]}</div>
  <button class="guide-btn" onclick="openGuide()">${t('guideBtn')}</button></header>
  <div class="grid">
    <div class="card"><div class="card-title"><span>⚖️</span> ${t('sizing')}</div>
        <div class="field"><div class="field-row"><label>${t('numPizzas')}</label><input type="number" value="${state.numPizzas}" min="1" step="1" onchange="upd('numPizzas',this.value)"></div></div>
        <div class="field"><div class="field-row"><label>${t('bunWeight')}</label><input type="number" value="${state.pizzaWeight}" min="50" step="10" onchange="upd('pizzaWeight',this.value)"><span class="unit">g</span></div><div class="note">${t('bunWeightNote')}</div></div>
        <div class="field"><div class="field-row"><label>${t('semProp')}</label><input type="number" value="${state.semolinaRatio}" min="0" max="100" step="0.1" onchange="upd('semolinaRatio',this.value)"><span class="unit">%</span></div><div class="note">${t('semPropNote')}</div></div>
    </div>
    <div class="card"><div class="card-title"><span>🥖</span> ${t('doughParams')}</div>
      <div class="field"><div class="field-row"><label>${t('hydration')} <button class="help-btn" onclick="showTip(event,'hydration')">?</button></label><input type="number" value="${state.hydration}" min="40" max="100" step="0.5" onchange="upd('hydration',this.value)"><span class="unit">%</span></div><div class="note">${t('hydrationNote')}</div></div>
      <div class="field"><div class="field-row"><label>${t('salt')}</label><input type="number" value="${state.saltPercent}" min="0" max="5" step="0.1" onchange="upd('saltPercent',this.value)"><span class="unit">%</span></div><div class="note">${t('saltNote')}</div></div>
      <hr class="divider">
      <div class="field"><div class="field-row"><label>${t('bigaFlour')} <button class="help-btn" onclick="showTip(event,'biga')">?</button></label><span class="computed">${state.bigaFlour} g</span></div></div>
      <div class="field"><div class="field-row"><label>${t('bigaWater')}</label><span class="computed">${state.bigaWater} g</span></div><div class="note">${t('bigaNote')}</div></div>
    </div>
    <div class="card full"><div class="card-title"><span>🌾</span> ${t('proteinContent')}</div>
      <div class="note" style="margin-bottom:14px;margin-top:-8px">${t('proteinNote')}</div>
      <div class="protein-grid">
        <div class="field"><label>${t('flourProtein')} <button class="help-btn" onclick="showTip(event,'flour')">?</button></label><div class="field-row"><input type="number" value="${state.flourProtein}" min="0" max="100" step="0.1" onchange="upd('flourProtein',this.value)"><span class="unit">%</span></div></div>
        <div class="field"><label>${t('semProtein')} <button class="help-btn" onclick="showTip(event,'semolina')">?</button></label><div class="field-row"><input type="number" value="${state.semolinaProtein}" min="0" max="100" step="0.1" onchange="upd('semolinaProtein',this.value)"><span class="unit">%</span></div></div>
        <div class="field"><label>${t('glutenProtein')} <button class="help-btn" onclick="showTip(event,'gluten')">?</button></label><div class="field-row"><input type="number" value="${state.glutenProtein}" min="0" max="100" step="0.1" onchange="upd('glutenProtein',this.value)"><span class="unit">%</span></div></div>
      </div><hr class="divider">
      <div class="field"><div class="field-row"><label>${t('targetProtein')}</label><input type="number" value="${state.targetProtein}" min="0" max="50" step="0.1" style="width:110px;text-align:right" onchange="upd('targetProtein',this.value)"><span class="unit">%</span></div><div class="note">${t('glutenAutoNote')} ${r.actualProtein.toFixed(2)}%</div></div>
    </div>
    <div class="card full"><div class="card-title"><span>📋</span> ${t('recipe')}</div>
      ${r.warning?`<div class="warning-box">${r.warning}</div>`:''}
      <div class="recipe-cols">
        <div class="recipe-ingredients">
          <div class="ing-card"><div class="ing-icon">🌾</div><div class="ing-info"><div class="ing-name">${t('flour')}${presets[activePreset].flourType?` <span class="ing-optional-tag">${presets[activePreset].flourType==='bread'?t('breadFlour'):'Tipo '+presets[activePreset].flourType}</span>`:''}</div><div class="ing-amounts"><div class="ing-net">${r.netFlour} g</div><div class="ing-total">${t('total')} ${r.flour} g</div></div><div class="ing-biga">${state.bigaFlour} g ${t('inBiga')}</div></div></div>
          ${r.semolina>0?`<div class="ing-card"><div class="ing-icon">🟡</div><div class="ing-info"><div class="ing-name">${t('semolina')}</div><div class="ing-amounts"><div class="ing-net">${r.netSemolina} g</div></div></div></div>`:''}
          ${r.gluten>0?`<div class="ing-card"><div class="ing-icon">💪</div><div class="ing-info"><div class="ing-name">${t('gluten')}</div><div class="ing-amounts"><div class="ing-net">${r.netGluten} g</div></div></div></div>`:''}
          <div class="ing-card"><div class="ing-icon">💧</div><div class="ing-info"><div class="ing-name">${t('water')}</div><div class="ing-amounts"><div class="ing-net">${r.netWater} g</div><div class="ing-total">${t('total')} ${r.totalWater} g</div></div><div class="ing-biga">${state.bigaWater} g ${t('inBiga')}</div></div></div>
          <div class="ing-card"><div class="ing-icon">🧂</div><div class="ing-info"><div class="ing-name">${t('saltIng')}</div><div class="ing-amounts"><div class="ing-net">${r.salt} g</div></div></div></div>
          ${presets[activePreset].oil==='required'?`<div class="ing-card"><div class="ing-icon">🫒</div><div class="ing-info"><div class="ing-name">${t('oil')}</div><div class="ing-amounts"><div class="ing-net">${r.oilLow}–${r.oilHigh} g</div></div><div class="ing-biga">${t('oilRange')}</div></div></div>`:''}${presets[activePreset].oil==='optional'?`<div class="ing-card optional"><div class="ing-icon">🫒</div><div class="ing-info"><div class="ing-name">${t('oil')} <span class="ing-optional-tag">${t('oilOptional')}</span></div><div class="ing-amounts"><div class="ing-net">${r.oilLow}–${r.oilHigh} g</div></div><div class="ing-biga">${t('oilRange')}</div></div></div>`:''}
          <div class="ing-card" style="background:var(--accent-pale);border-color:var(--accent-light)"><div class="ing-icon">🫗</div><div class="ing-info"><div class="ing-name">${t('bigaLabel')}</div><div class="ing-amounts"><div class="ing-net">${state.bigaFlour} g ${t('flour').toLowerCase()} + ${state.bigaWater} g ${t('water').toLowerCase()}</div></div><div class="ing-biga">${t('bigaRecipeNote')}</div></div></div>
        </div>
        <div class="recipe-summary">
          <div class="summary-item"><div class="summary-label">${t('totalDough')}</div><div class="summary-value">${r.totalDough}</div><div class="summary-unit">${t('grams')}</div></div><div class="summary-divider"></div>
          <div class="summary-item"><div class="summary-label">${t('pizzas')}</div><div class="summary-value">${r.numPizzas}</div><div class="summary-unit">× ${state.pizzaWeight} g</div></div><div class="summary-divider"></div>
          <div class="summary-item"><div class="summary-label">${t('hydration')}</div><div class="summary-value">${state.hydration}%</div></div>
        </div>
      </div>
    </div>
  </div>`;
}

function upd(k,v){state[k]=parseFloat(v)||0;render()}
function setLang(l){lang=l;render()}

function openGuide(){document.getElementById('modalBody').innerHTML=t('guide');document.getElementById('modalOverlay').classList.add('open')}
function closeModal(){document.getElementById('modalOverlay').classList.remove('open')}
function showTip(e,key){
  e.stopPropagation();const m={hydration:['tipHydrationT','tipHydration'],flour:['tipFlourT','tipFlour'],semolina:['tipSemolinaT','tipSemolina'],gluten:['tipGlutenT','tipGluten'],biga:['tipBigaT','tipBiga']}[key];
  if(!m)return;const box=document.getElementById('tipBox');
  document.getElementById('tipTitle').textContent=t(m[0]);document.getElementById('tipText').innerHTML=t(m[1]);
  box.style.display='block';document.getElementById('tipOverlay').classList.add('open');
  const isPhone=window.innerWidth<=480;
  if(isPhone){box.style.top='auto';box.style.bottom='20px';box.style.left='10px';box.style.right='10px';box.style.maxWidth='none';box.style.width='auto'}
  else{const rect=e.target.getBoundingClientRect();let top=rect.bottom+8,left=rect.left-140;
  if(left<12)left=12;if(left+340>window.innerWidth)left=window.innerWidth-352;
  if(top+200>window.innerHeight)top=rect.top-8-box.offsetHeight;
  box.style.top=top+'px';box.style.left=left+'px';box.style.bottom='auto';box.style.right='auto';box.style.maxWidth='340px';box.style.width=''}
}
function closeTip(){document.getElementById('tipOverlay').classList.remove('open');document.getElementById('tipBox').style.display='none'}
render();

// ── PWA: Service Worker (inline, for offline support) ──
if('serviceWorker' in navigator){
  const swCode=`
    const CACHE='pizza-dough-v1';
    const URLS=[self.location.href];
    self.addEventListener('install',e=>e.waitUntil(caches.open(CACHE).then(c=>c.addAll(URLS)).then(()=>self.skipWaiting())));
    self.addEventListener('activate',e=>e.waitUntil(caches.keys().then(ks=>Promise.all(ks.filter(k=>k!==CACHE).map(k=>caches.delete(k)))).then(()=>self.clients.claim())));
    self.addEventListener('fetch',e=>{if(e.request.method!=='GET')return;e.respondWith(fetch(e.request).then(r=>{const cl=r.clone();caches.open(CACHE).then(c=>c.put(e.request,cl));return r}).catch(()=>caches.match(e.request)))});
  `;
  const blob=new Blob([swCode],{type:'application/javascript'});
  navigator.serviceWorker.register(URL.createObjectURL(blob),{scope:'.'}).catch(()=>{});
}

// ── PWA: Install prompt ──
let deferredPrompt=null;
window.addEventListener('beforeinstallprompt',e=>{e.preventDefault();deferredPrompt=e;showInstallBtn()});
function showInstallBtn(){
  if(document.getElementById('pwa-install'))return;
  const btn=document.createElement('button');btn.id='pwa-install';
  btn.textContent='📲 Install App';
  btn.style.cssText='position:fixed;bottom:20px;right:20px;padding:12px 22px;background:#c0582a;color:#fff;border:none;border-radius:28px;font-family:Source Sans 3,sans-serif;font-size:.9rem;font-weight:700;cursor:pointer;box-shadow:0 4px 16px rgba(192,88,42,.35);z-index:999;transition:opacity .3s';
  btn.onclick=()=>{if(deferredPrompt){deferredPrompt.prompt();deferredPrompt.userChoice.then(()=>{deferredPrompt=null;btn.remove()})}};
  document.body.appendChild(btn);
  setTimeout(()=>{if(document.getElementById('pwa-install'))btn.style.opacity='0';setTimeout(()=>btn.remove(),300)},15000);
}
